version: '3.8'
services:
  agentgate-backend:
    build: .
    ports:
      - "3000:3000"
    environment:
      - GITHUB_TOKEN=${GITHUB_TOKEN}
    volumes:
      - ./agentgate.audit.log:/app/agentgate.audit.log
    restart: always

# Usage:
# 1. Create a .env file with GITHUB_TOKEN
# 2. Run: docker-compose up -d